name: build-push

# Build and push all service images to GitHub Container Registry (ghcr.io) on a
# version tag. Deploy then bumps the image tags in k8s/overlays/production.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (e.g. v0.1.0)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - post-service
          - search-service
          - notification-service
          - frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag + build context
        id: meta
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if [ "${{ matrix.service }}" = "frontend" ]; then
            echo "context=./frontend" >> "$GITHUB_OUTPUT"
            echo "dockerfile=./frontend/Dockerfile" >> "$GITHUB_OUTPUT"
          else
            # Go services build from the repo root so the Dockerfile can COPY proto.
            echo "context=." >> "$GITHUB_OUTPUT"
            echo "dockerfile=./services/${{ matrix.service }}/Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.meta.outputs.context }}
          file: ${{ steps.meta.outputs.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
