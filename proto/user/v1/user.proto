syntax = "proto3";

package user.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/nikitashilov/microblog_grpc/proto/user/v1;userv1";

message CreateUserRequest {
  string id = 1;
  string email = 2;
  string name = 3;
  string picture = 4;
  string password = 5;  // optional; for email/password signup only
}

message UpdateUserRequest {
  string id = 1;
  google.protobuf.StringValue name = 2;
  google.protobuf.StringValue picture = 3;
  google.protobuf.StringValue bio = 4;
  google.protobuf.StringValue location = 5;
  google.protobuf.StringValue website = 6;
  string actor_id = 7;
}

message DeleteUserRequest {
  string id = 1;
  string actor_id = 2;
}

message GetUserRequest {
  string id = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message GetUserProfileRequest {
  string id = 1;
}

message ListUsersRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message SearchUsersRequest {
  string query = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message User {
  string id = 1;
  string email = 2;
  string name = 3;
  string picture = 4;
  string bio = 5;
  string location = 6;
  string website = 7;
  bool is_active = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message UserProfile {
  string id = 1;
  string email = 2;
  string name = 3;
  string picture = 4;
  string bio = 5;
  string location = 6;
  string website = 7;
}

message ListUsersResponse {
  repeated User users = 1;
  int32 limit = 2;
  int32 offset = 3;
  int32 total = 4;
}

message UserStatsResponse {
  int64 total_active_users = 1;
}

message FollowRequest {
  string follower_id = 1;
  string followee_id = 2;
}

message UnfollowRequest {
  string follower_id = 1;
  string followee_id = 2;
}

message GetFollowersRequest {
  string user_id = 1;
  int32 limit = 2;
  string cursor = 3;
}

message GetFollowingRequest {
  string user_id = 1;
  int32 limit = 2;
  string cursor = 3;
}

message ListFollowResponse {
  repeated UserProfile users = 1;
  string next_cursor = 2;
}

message AreFollowedRequest {
  string follower_id = 1;
  repeated string followee_ids = 2;
}

message AreFollowedResponse {
  repeated string followed_ids = 1;
}

message ValidateCredentialsRequest {
  string email = 1;
  string password = 2;
}

message ValidateCredentialsResponse {
  string id = 1;
  string email = 2;
  string name = 3;
  string picture = 4;
}

service UserService {
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc ValidateCredentials(ValidateCredentialsRequest) returns (ValidateCredentialsResponse);
  rpc GetUser(GetUserRequest) returns (User);
  rpc GetUserByEmail(GetUserByEmailRequest) returns (User);
  rpc GetUserProfile(GetUserProfileRequest) returns (UserProfile);
  rpc UpdateUser(UpdateUserRequest) returns (User);
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc SearchUsers(SearchUsersRequest) returns (ListUsersResponse);
  rpc GetStats(google.protobuf.Empty) returns (UserStatsResponse);
  rpc Follow(FollowRequest) returns (google.protobuf.Empty);
  rpc Unfollow(UnfollowRequest) returns (google.protobuf.Empty);
  rpc GetFollowers(GetFollowersRequest) returns (ListFollowResponse);
  rpc GetFollowing(GetFollowingRequest) returns (ListFollowResponse);
  rpc AreFollowed(AreFollowedRequest) returns (AreFollowedResponse);
  rpc HealthCheck(google.protobuf.Empty) returns (google.protobuf.Empty);
}
