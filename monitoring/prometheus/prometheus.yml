# Scrape defaults match docker-compose service names and default *PORT* env values.
# If you change HTTP/metrics ports in Compose, update targets here (or add relabel rules).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:8081"]

  - job_name: user-service
    metrics_path: /metrics
    static_configs:
      - targets: ["user-service:8082"]

  - job_name: post-service
    metrics_path: /metrics
    static_configs:
      - targets: ["post-service:8083"]

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ["notification-service:8084"]

  - job_name: search-service
    metrics_path: /metrics
    static_configs:
      - targets: ["search-service:9095"]
