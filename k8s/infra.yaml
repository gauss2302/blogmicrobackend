# Infrastructure: redis, 3x postgres, rabbitmq, kafka, opensearch.
# emptyDir storage (disposable, experiment). JVM heaps trimmed for the 8GB box.
# ---------------- Redis ----------------
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis, namespace: blogmesh }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["sh", "-c", "redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass \"$REDIS_PASSWORD\""]
          env:
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: blogmesh-secrets, key: REDIS_PASSWORD } }
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping"] }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: blogmesh }
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
# ---------------- Postgres (user) ----------------
apiVersion: apps/v1
kind: Deployment
metadata: { name: postgres-user, namespace: blogmesh }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres-user } }
  template:
    metadata: { labels: { app: postgres-user } }
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - { name: POSTGRES_DB, value: userdb }
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_INITDB_ARGS, value: "--auth-host=scram-sha-256" }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: blogmesh-secrets, key: POSTGRES_USER_PASSWORD } }
          ports: [{ containerPort: 5432 }]
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "postgres", "-d", "userdb"] }
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: postgres-user, namespace: blogmesh }
spec:
  selector: { app: postgres-user }
  ports: [{ port: 5432, targetPort: 5432 }]
---
