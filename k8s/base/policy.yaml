---
# ---- notification-service: HTTP 8084 -> api-gateway only ----
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata: { name: notification-service-http, namespace: blogmesh }
spec:
  podSelector: { matchLabels: { app: notification-service } }
  port: 8084
  proxyProtocol: HTTP/1
