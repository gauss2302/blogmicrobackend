  identityRefs:
    - { kind: ServiceAccount, name: api-gateway }
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata: { name: post-service-grpc-authz, namespace: blogmesh }
spec:
  targetRef: { group: policy.linkerd.io, kind: Server, name: post-service-grpc }
  requiredAuthenticationRefs:
    - { group: policy.linkerd.io, kind: MeshTLSAuthentication, name: post-service-clients }
---
# ---- search-service: gRPC 50054 -> api-gateway only ----
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata: { name: search-service-grpc, namespace: blogmesh }
spec:
  podSelector: { matchLabels: { app: search-service } }
  port: 50054
