---
apiVersion: policy.linkerd.io/v1alpha1
kind: MeshTLSAuthentication
metadata: { name: search-service-clients, namespace: blogmesh }
spec:
  identityRefs:
    - { kind: ServiceAccount, name: api-gateway }
---
apiVersion: policy.linkerd.io/v1alpha1
