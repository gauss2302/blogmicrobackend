apiVersion: v1
kind: Secret
metadata:
  name: blogmesh-secrets
  namespace: blogmesh
type: Opaque
# Dev placeholders (mirrors the gitignored root .env). Replace for anything real.
stringData:
  # Postgres server passwords (per instance)
  POSTGRES_USER_PASSWORD: replace-with-user-db-password
  POSTGRES_POST_PASSWORD: replace-with-post-db-password
  POSTGRES_NOTIFICATION_PASSWORD: replace-with-notification-db-password
  # Full DATABASE_URLs (k8s Service hostnames — postgres-* with hyphens)
  DATABASE_URL_USER: postgres://postgres:replace-with-user-db-password@postgres-user:5432/userdb?sslmode=disable
  DATABASE_URL_POST: postgres://postgres:replace-with-post-db-password@postgres-post:5432/postdb?sslmode=disable
  DATABASE_URL_NOTIFICATION: postgres://postgres:replace-with-notification-db-password@postgres-notification:5432/notificationdb?sslmode=disable
  # Redis
  REDIS_PASSWORD: replace-with-redis-password
  # RabbitMQ (server creds + full URL for clients)
  RABBITMQ_USER: replace-with-rabbitmq-user
  RABBITMQ_PASSWORD: replace-with-rabbitmq-password
  RABBITMQ_VHOST: replace-with-rabbitmq-vhost
  RABBITMQ_URL: amqp://replace-with-rabbitmq-user:replace-with-rabbitmq-password@rabbitmq:5672/replace-with-rabbitmq-vhost
  # Shared JWT signing secret (auth-service signs, notification-service verifies)
  JWT_SECRET: replace-with-at-least-32-random-characters
  # Google OAuth (placeholders — rotate/replace for real OAuth)
  GOOGLE_CLIENT_ID: replace-with-your-google-oauth-client-id
  GOOGLE_CLIENT_SECRET: replace-with-your-google-oauth-client-secret
