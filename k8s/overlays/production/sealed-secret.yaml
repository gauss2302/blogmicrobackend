# ============================================================================
# ⚠️  PLACEHOLDER — these encryptedData values are FAKE and will NOT decrypt.
# You MUST regenerate this file before deploying. SealedSecret ciphertext is
# encrypted with YOUR cluster's sealed-secrets public key, so it cannot be
# pre-baked here. Workflow (details in docs/production.md):
#
#   1. Install the controller:  kubeseal / sealed-secrets controller in the cluster.
#   2. Author a plaintext Secret locally (NEVER commit it), e.g. secret.plain.yaml
#      with the 14 keys below and real values.
#   3. Seal it:
#        kubeseal --controller-namespace kube-system --format yaml \
#          < secret.plain.yaml > k8s/overlays/production/sealed-secret.yaml
#   4. Commit the sealed output (safe — only your cluster can decrypt it).
#
# The controller decrypts this into a normal Secret named `blogmesh-secrets`,
# which every service references via secretKeyRef.
# ============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: blogmesh-secrets
  namespace: blogmesh
spec:
  encryptedData:
    POSTGRES_USER_PASSWORD: REGENERATE_WITH_kubeseal
    POSTGRES_POST_PASSWORD: REGENERATE_WITH_kubeseal
    POSTGRES_NOTIFICATION_PASSWORD: REGENERATE_WITH_kubeseal
    DATABASE_URL_USER: REGENERATE_WITH_kubeseal
    DATABASE_URL_POST: REGENERATE_WITH_kubeseal
    DATABASE_URL_NOTIFICATION: REGENERATE_WITH_kubeseal
    REDIS_PASSWORD: REGENERATE_WITH_kubeseal
    RABBITMQ_USER: REGENERATE_WITH_kubeseal
    RABBITMQ_PASSWORD: REGENERATE_WITH_kubeseal
    RABBITMQ_VHOST: REGENERATE_WITH_kubeseal
    RABBITMQ_URL: REGENERATE_WITH_kubeseal
    JWT_SECRET: REGENERATE_WITH_kubeseal
    GOOGLE_CLIENT_ID: REGENERATE_WITH_kubeseal
    GOOGLE_CLIENT_SECRET: REGENERATE_WITH_kubeseal
  template:
    metadata:
      name: blogmesh-secrets
      namespace: blogmesh
    type: Opaque
