# Application services. Discovery is native k8s DNS (Service names == compose
# hostnames, except postgres-* hyphenated). gateway + frontend are NodePort
# (mapped to host 8080/3000 by the k3d cluster).
#
# Each pod is Linkerd-meshed (linkerd.io/inject) and runs under its own
# ServiceAccount so Linkerd can authorize service-to-service traffic by identity.
apiVersion: v1
kind: ConfigMap
metadata: { name: blogmesh-common, namespace: blogmesh }
data:
  ENVIRONMENT: production
  LOG_LEVEL: info
  SERVICE_TRANSPORT_SECURITY: mesh
  INTERNAL_HTTP_TRUST_MODE: private_network
  GRPC_TLS_ENABLED: "false"
  GRPC_REFLECTION_ENABLED: "false"
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: auth-service, namespace: blogmesh }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: user-service, namespace: blogmesh }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: post-service, namespace: blogmesh }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: search-service, namespace: blogmesh }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: notification-service, namespace: blogmesh }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: api-gateway, namespace: blogmesh }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: frontend, namespace: blogmesh }
---
# ---------------- auth-service ----------------
apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, namespace: blogmesh }
spec:
  replicas: 1
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata:
      labels: { app: auth-service }
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/skip-outbound-ports: "5432,5672,6379,9092,9200"
    spec:
      serviceAccountName: auth-service
      containers:
        - name: auth-service
          image: blogmesh/auth-service:dev
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 8081 }, { name: grpc, containerPort: 50051 }]
          envFrom: [{ configMapRef: { name: blogmesh-common } }]
          env:
            - { name: PORT, value: "8081" }
            - { name: GRPC_PORT, value: "50051" }
            - { name: REDIS_URL, value: "redis:6379" }
            - { name: REDIS_DB, value: "0" }
            - { name: USER_SERVICE_GRPC_ADDR, value: "user-service:50052" }
            - { name: JWT_ACCESS_TTL, value: "15" }
            - { name: JWT_REFRESH_TTL, value: "168" }
            - { name: JWT_ISSUER, value: "auth-service" }
            - { name: GOOGLE_REDIRECT_URL, value: "http://localhost:8080/api/v1/auth/google/callback" }
            - { name: GOOGLE_DEFAULT_WEB_REDIRECT_URI, value: "http://localhost:3000/auth/callback" }
            - { name: GOOGLE_ALLOWED_WEB_REDIRECT_URIS, value: "http://localhost:3000/auth/callback" }
            - { name: GOOGLE_ALLOWED_MOBILE_REDIRECT_URIS, value: "myapp://auth/callback" }
            - { name: FRONTEND_URL, value: "http://localhost:3000" }
            - { name: REDIS_PASSWORD, valueFrom: { secretKeyRef: { name: blogmesh-secrets, key: REDIS_PASSWORD } } }
            - { name: JWT_SECRET, valueFrom: { secretKeyRef: { name: blogmesh-secrets, key: JWT_SECRET } } }
            - { name: GOOGLE_CLIENT_ID, valueFrom: { secretKeyRef: { name: blogmesh-secrets, key: GOOGLE_CLIENT_ID } } }
            - { name: GOOGLE_CLIENT_SECRET, valueFrom: { secretKeyRef: { name: blogmesh-secrets, key: GOOGLE_CLIENT_SECRET } } }
          readinessProbe: { httpGet: { path: /health, port: 8081 }, initialDelaySeconds: 10, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: blogmesh }
spec:
  selector: { app: auth-service }
  ports: [{ name: http, port: 8081, targetPort: 8081 }, { name: grpc, port: 50051, targetPort: 50051 }]
---
# ---------------- user-service ----------------
apiVersion: apps/v1
kind: Deployment
metadata: { name: user-service, namespace: blogmesh }
spec:
  replicas: 1
  selector: { matchLabels: { app: user-service } }
  template:
    metadata:
      labels: { app: user-service }
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/skip-outbound-ports: "5432,5672,6379,9092,9200"
    spec:
      serviceAccountName: user-service
      containers:
        - name: user-service
          image: blogmesh/user-service:dev
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 8082 }, { name: grpc, containerPort: 50052 }]
          envFrom: [{ configMapRef: { name: blogmesh-common } }]
          env:
            - { name: PORT, value: "8082" }
            - { name: GRPC_PORT, value: "50052" }
            - { name: DB_MAX_OPEN_CONNS, value: "25" }
            - { name: DB_MAX_IDLE_CONNS, value: "10" }
            - { name: DB_CONN_MAX_LIFETIME, value: "60" }
            - { name: DB_MIGRATION_PATH, value: "./migrations" }
            - { name: DATABASE_URL, valueFrom: { secretKeyRef: { name: blogmesh-secrets, key: DATABASE_URL_USER } } }
          readinessProbe: { httpGet: { path: /health, port: 8082 }, initialDelaySeconds: 10, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: user-service, namespace: blogmesh }
spec:
  selector: { app: user-service }
  ports: [{ name: http, port: 8082, targetPort: 8082 }, { name: grpc, port: 50052, targetPort: 50052 }]
---
